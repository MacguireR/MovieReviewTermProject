<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        h2 {
            color: red;
        }
        p {
            color: white;
        }
        a {
            color: white;
        }
        body {
            font-family: Arial;
            background: #F7EDE2;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .login-box {
            background: #FFFFFF;
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 12 30px rgba(72,29,36,0.18);
            box-shadow: 0 2 8px rgba(72,29,36,0.12);
            border-top: 4px solid #FFC857;
        }
        h2{
            color: #481D24
        }
        input {
            width: 100%;
            width: 276px;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #255F85;
            box-shadow: 0 0 0 3px rgba(37,95,133,0.2);
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #C5283D;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            cursor:pointer;
            transition: 0.2 ease;
        }
        button:hover {
            background: #E9724C;
        }
        p {
            color:#481D24;
            font-size: 14px;
        }
        a {
            color: #255F85;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            color: #E9724C
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign In</button>
            <p>Don't have an account? Create one <a href="/createAccount" class="button-link">
                here
            </a></p>
        </form>
    </div>
</body>
</html>
