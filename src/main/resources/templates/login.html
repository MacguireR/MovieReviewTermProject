<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0B1F3A; /* navy */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* LOGIN BOX */
        .login-box {
            background: #A7D8FF; /* light blue */
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 4px solid #4FC3F7;
        }

        /* TITLE */
        h2 {
            color: #0B1F3A;
            margin-bottom: 20px;
        }

        /* INPUTS */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(79,195,247,0.4);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 10px;
            background: #0B1F3A;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #163A5F;
        }

        p {
            font-size: 14px;
            color: #0B1F3A;
        }

        a {
            color: #0B1F3A;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            color: #4FC3F7;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign In</button>
            <p>Don't have an account? Create one <a href="/createAccount" class="button-link">
                here
            </a></p>
        </form>
    </div>
</body>
</html>
