<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        h2 {
            color: red;
        }
        p {
            color: white;
        }
        a {
            color: white;
        }
        body {
            font-family: Arial;
            background: #bbbbbb;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .login-box {
            background: rgb(67, 67, 67);
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(21, 21, 21);
        }
        input {
            width: 100%;
            width: 276px;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Sign In</button>
            <p>Don't have an account? Create one <a href="/createAccount" class="button-link">
                here
            </a></p>
        </form>
    </div>
</body>
</html>
