<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <style>
        h2 {
            color: red;
        }
        p {
            color: white;
        }
        a {
            color: white;
        }
        body {
            font-family: Arial;
            background: #bbbbbb;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .login-box {
            background: rgb(67, 67, 67);
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(21, 21, 21);
        }
        input {
            width: 100%;
            width: 276px;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
        .msg {color:green;}
        .err{color:red;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Create Account</h2>
        <p class="msg" th:if="${param.created}">Account is created <a href="/login">Log in</a></p>
        <p class="err" th:if="${param.error}">That username is already in use </p>
        <form th:action="@{/createAccount}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" recquired>
            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
