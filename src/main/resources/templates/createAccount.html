<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0B1F3A; /* navy */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .account-box {
            background: #A7D8FF; /* light blue */
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 4px solid #4FC3F7;
        }

        h2 {
            margin-top: 0;
            color: #0B1F3A;
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(79,195,247,0.4);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0B1F3A;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #163A5F;
        }

        p {
            font-size: 14px;
            color: #0B1F3A;
            margin-top: 12px;
            text-align: center;
        }

        a {
            color: #0B1F3A;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            color: #4FC3F7;
        }

        .msg {
            color: green;
            font-weight: bold;
        }

        .err {
            color: #B00020;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="account-box">

    <h2>Create Account</h2>

    <p class="msg" th:if="${param.created}">
        Account created successfully.
        <a href="/login">Log in</a>
    </p>

    <p class="err" th:if="${param.error}">
        That username is already in use.
    </p>

    <p class="err" th:if="${param.dberror}">
        Could not create account right now. Please try again.
    </p>

    <form th:action="@{/createAccount}" method="post">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Log In</a>
    </p>

</div>

</body>
</html>
